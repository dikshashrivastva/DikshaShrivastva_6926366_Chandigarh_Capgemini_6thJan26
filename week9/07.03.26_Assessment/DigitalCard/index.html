<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Purple Birthday Card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

    <h1>Happy Birthday 🎂</h1>

    <p class="message">
        Today is all about you ✨  
        <br>
        May your day be filled with smiles, cake, and magical little moments.
    </p>

    <button onclick="showMessage()">Open Your Surprise 💜</button>

    <p id="surprise" class="hidden">
        Wishing you lots of joy! 🌸  
        <br>
        May your dreams sparkle brighter than the stars tonight ✨
    </p>

</div>

<script src="script.js"></script>

</body>
</html>
